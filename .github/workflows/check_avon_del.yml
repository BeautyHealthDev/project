name: Check consultants moved to Avon

on:
  push:
    paths:
      # - 'mailing/ConsultantTreeMLM*.xml'
  workflow_dispatch:

jobs:
  build-contacts-list:
    runs-on: ubuntu-latest
    outputs:
      # Прокидываем output шага на уровень всей джобы
      file_name: "contacts_avon_pv.json" # Передаем имя файла
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Активирует Node.js 24 для всех JS-действий в этом задании    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Обязательно: выкачиваем историю, чтобы сравнить коммиты

      - name: Install xsltproc
        run: |
          sudo apt-get update
          sudo apt-get install -y xsltproc
          
      - name: Transform XML to JSON
        run: |
          # Запускаем трансформацию для определения нового списка контактов
          xsltproc mailing/contacts_avon_ConsultantTreeMLM.xsl mailing/ConsultantTreeMLM_JULIA.xml > contacts_avon.json
          
          # Вычисляем разницу и сохраняем в переменную JSON-массив
          DIFF_JSON=$(jq -s 'map([ .. | objects | select(has("cons_number")) | {cons_number} ]) | .[1] - .[0]' contacts_avon.json mailing/contacts_avon_start.json)
          
          # Считаем длину прямо из переменной
          COUNT=$(echo "$DIFF_JSON" | jq '. | length')
          echo "Количество не найденных консультантов: $COUNT"
      
          # Формируем строку номеров
          DIFF_NUMBERS=$(echo "$DIFF_JSON" | jq -r '[.[].cons_number] | " " + join(" ") + " "')
          echo "ИД не найденных консультантов: $DIFF_NUMBERS"
          
          # Запускаем трансформацию с параметрами на начальном списке
          xsltproc --stringparam allowedNumbers "$DIFF_NUMBERS" mailing/contacts_avon_del_ConsultantTreeMLM.xsl mailing/ConsultantTreeMLM_avon_start.xml > contacts_avon_pv.json

          # Считаем элементы и выводим в консоль
          COUNT=$(jq '. | length' contacts_avon_pv.json)
          echo "Количество элементов в файле: $COUNT"
          # Вывод результата в лог для проверки
          echo "Список ушедших консультантов:"
          cat contacts_avon_pv.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mail-contacts
          path: contacts_avon_*.json
          
      - name: Generate Summary Report
        id: report
        run: |
          FILE="contacts_avon_pv.json"
          
          # 1. Общее количество
          TOTAL=$(jq '. | length' $FILE)
          echo "Всего: $TOTAL"
          
          # Генерируем данные с разделителем
          TABLE_LIST=$(jq -r '
            "ИД\tИмя\tЛО",
            "--------------------------------------------------",
            (.[] | "\(.cons_number)\t\(.name)\t\(.pv)")
          ' $FILE)
          echo "$TABLE_LIST"
          
          # Сводная таблица по наставникам
          TABLE_TUTOR=$(jq -r '
            [ group_by(.tutor_name)[] | {t: .[0].tutor_name, c: length} ] | sort_by(.c) | reverse 
            | . as $items
            | ($items[] | "\(.t): \(.c)"), 
              "ИТОГО: \( [ $items[].c ] | add )"
          ' $FILE)
          echo "$TABLE_TUTOR"

          TABLE_PV=$(jq -r '
            [ 
              group_by(.tutor_name)[] | {
                t: .[0].tutor_name, 
                s: (map(.pv | tonumber) | add) 
              } 
            ] 
            | sort_by(.s) | reverse 
            | . as $items
            | ($items[] | "\(.t): \(.s)"), 
              "ИТОГО: \( [ $items[].s ] | add )"
          ' $FILE)
          echo "$TABLE"
          # Формируем параметры для текста в Telegram
          # Безопасная запись многострочного вывода
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "table<<EOF" >> $GITHUB_OUTPUT
          echo "**По количеству ушедших:**" >> $GITHUB_OUTPUT
          echo "${TABLE_TUTOR:-Нет данных по наставникам}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            📊 **Всего ушло в Avon: ${{ steps.report.outputs.total }} **
            ${{ steps.report.outputs.table }}
