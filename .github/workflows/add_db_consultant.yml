name: Add New Consultant To Database

on:
  push:
    paths:
      - 'mailing/ConsultantTreeMLM*.xml'
  workflow_dispatch:

jobs:
  build-contacts-list:
    runs-on: ubuntu-latest
    outputs:
      # Прокидываем output шага на уровень всей джобы
      file_name: "contacts_new_with_dates.json" # Передаем имя файла
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Активирует Node.js 24 для всех JS-действий в этом задании    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Обязательно: выкачиваем историю, чтобы сравнить коммиты

      - name: Install xsltproc
        run: |
          sudo apt-get update
          sudo apt-get install -y xsltproc
          
      - name: Transform XML to JSON
        run: |
          # Получаем дату в нужном формате
          YESTERDAY=$(date -d 'yesterday' +'%Y-%m-%dT00:00:00')
          # Выводим в консоль для проверки
          echo "Value of YESTERDAY: $YESTERDAY"
          # Запускаем трансформацию с параметрами
          xsltproc --stringparam fromDate "$YESTERDAY" \
                   --stringparam toDate "$YESTERDAY" \
                   mailing/contacts_new_db_ConsultantTreeMLM.xsl mailing/ConsultantTreeMLM_JULIA.xml > contacts_new_with_dates.json
          # Считаем элементы и выводим в консоль
          COUNT=$(jq '. | length' contacts_new_with_dates.json)
          echo "Количество элементов в файле: $COUNT"
          # Вывод результата в лог для проверки
          cat contacts_new_with_dates.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mail-contacts
          path: contacts_new_with_dates.json
          
      # Скрипт на Python для чтения JSON и отправки POST-запросов
      - name: Parse and Send JSON data
        env:
          API_URL: ${{ secrets.DB_API_URL }}
          API_TOKEN: ${{ secrets.DB_API_TOKEN }}
        run: |
          python -c "
          import json
          import os
          import urllib.request

          # Читаем секреты из переменных окружения GitHub
          api_url = os.environ['API_URL']
          api_token = os.environ['API_TOKEN']
          file_path = 'contacts_new_with_dates.json'

          # Проверяем, существует ли файл в репозитории
          if not os.path.exists(file_path):
              print(f'Ошибка: Файл {file_path} не найден в репозитории!')
              exit(1)

          with open(file_path, 'r', encoding='utf-8') as f:
              try:
                  consultants = json.load(f)
              except json.JSONDecodeError:
                  print('Ошибка: Файл содержит невалидный JSON!')
                  exit(1)

          print(f'Найдено записей для импорта: {len(consultants)}')

          success_count = 0
          error_count = 0

          # Перебираем каждого консультанта в массиве
          for idx, item in enumerate(consultants, 1):
              # Проверяем обязательное поле
              if 'cons_number' not in item:
                  print(f'Запись #{idx} пропущена: отсутствует cons_number')
                  error_count += 1
                  continue

              # Формируем тело запроса
              data_bytes = json.dumps(item).encode('utf-8')

              # Настраиваем заголовки (включая наш секретный токен защиты)
              req = urllib.request.Request(
                  api_url, 
                  data=data_bytes, 
                  headers={
                      'Content-Type': 'application/json',
                      'X-Api-Token': api_token
                  },
                  method='POST'
              )

              try:
                  with urllib.request.urlopen(req) as response:
                      res_body = response.read().decode('utf-8')
                      res_json = json.loads(res_body)
                      if res_json.get('success'):
                          success_count += 1
                      else:
                          print(f'Ошибка отправки записи {item[\"cons_number\"]}: {res_json.get(\"error\")}')
                          error_count += 1
              except Exception as e:
                  print(f'Сервер вернул ошибку при отправке {item[\"cons_number\"]}: {e}')
                  error_count += 1

          print(f'\nИмпорт завершен!')
          print(f'Успешно добавлено: {success_count}')
          print(f'Ошибок: {error_count}')
          
          if error_count > 0:
              exit(1) # Помечаем шаг как упавший, если были ошибки
          "
