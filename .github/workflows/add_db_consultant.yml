name: Add New Consultant To Database

on:
  push:
    paths:
      - 'mailing/ConsultantTreeMLM*.xml'
  workflow_dispatch:

jobs:
  build-contacts-list:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Активирует Node.js 24 для всех JS-действий в этом задании    
    steps:
      - name: Создаем и сохраняем имя файла
        id: save_name # ID обязателен для ссылки
        run: |
          echo "CONTACTS_FILE=contacts_new_with_dates.json" >> $GITHUB_OUTPUT
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Обязательно: выкачиваем историю, чтобы сравнить коммиты

      - name: Install xsltproc
        run: |
          sudo apt-get update
          sudo apt-get install -y xsltproc
          
      - name: Transform XML to JSON
        run: |
          CONTACTS_FILE=${{ steps.save_name.outputs.CONTACTS_FILE }}
          # Получаем дату в нужном формате
          YESTERDAY=$(date -d 'yesterday' +'%Y-%m-%dT00:00:00')
          # Выводим в консоль для проверки
          echo "Value of YESTERDAY: $YESTERDAY"
          # Запускаем трансформацию с параметрами
          xsltproc --stringparam fromDate "$YESTERDAY" \
                   --stringparam toDate "$YESTERDAY" \
                   mailing/contacts_new_db_ConsultantTreeMLM.xsl mailing/ConsultantTreeMLM_JULIA.xml > $CONTACTS_FILE
          # Считаем элементы и выводим в консоль
          COUNT=$(jq '. | length' $CONTACTS_FILE)
          echo "Количество элементов в файле: $COUNT"
          # Вывод результата в лог для проверки
          cat $CONTACTS_FILE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mail-contacts
          path: ${{ steps.save_name.outputs.CONTACTS_FILE }}
          
      # Скрипт на Python для чтения JSON и отправки POST-запросов
      - name: Parse and Send JSON data
        id: parse_step
        env:
          API_URL: ${{ secrets.DB_API_URL }}
          API_TOKEN: ${{ secrets.DB_API_TOKEN }}
          FILE_NAME: ${{ steps.save_name.outputs.CONTACTS_FILE }} 
        run: |
          python -c "
          import json
          import os
          import urllib.request

          # Читаем секреты из переменных окружения GitHub
          api_url = os.environ['API_URL']
          api_token = os.environ['API_TOKEN']
          file_path = os.environ['FILE_NAME']

          # Проверяем, существует ли файл в репозитории
          if not os.path.exists(file_path):
              print(f'Ошибка: Файл {file_path} не найден в репозитории!')
              exit(1)

          with open(file_path, 'r', encoding='utf-8') as f:
              try:
                  consultants = json.load(f)
              except json.JSONDecodeError:
                  print('Ошибка: Файл содержит невалидный JSON!')
                  exit(1)

          print(f'Найдено записей для импорта: {len(consultants)}')

          # Перед циклом инициализировать счетчики
          success_count = 0
          error_count = 0
          exists_count = 0

          # Перебираем каждого консультанта в массиве
          for idx, item in enumerate(consultants, 1):
              # Проверяем обязательное поле
              if 'cons_number' not in item:
                  print(f'Запись #{idx} пропущена: отсутствует cons_number')
                  error_count += 1
                  continue

              # Формируем тело запроса
              data_bytes = json.dumps(item).encode('utf-8')

              # Настраиваем заголовки (включая наш секретный токен защиты)
              req = urllib.request.Request(
                  api_url, 
                  data=data_bytes, 
                  headers={
                      'Content-Type': 'application/json',
                      'X-Api-Token': api_token
                  },
                  method='POST'
              )
              try:
                  with urllib.request.urlopen(req) as response:
                      res_body = response.read().decode('utf-8')
                      res_json = json.loads(res_body)
                      
                      if res_json.get('success'):
                          # Проверяем, вернула ли база -1 (запись уже существует)
                          if res_json.get('inserted_id') == -1:
                              exists_count += 1
                              print(f'Запись {item['cons_number']} уже существует в базе.')
                          else:
                              success_count += 1
                              print(f'Запись {item['cons_number']} успешно добавлена.')
                      else: 
                          print(f'Ошибка отправки записи {item['cons_number']}: {res_json.get('error')}')
                          error_count += 1
                          
              except Exception as e:
                  print(f'Сервер вернул ошибку при отправке {item['cons_number']}: {e}')
                  error_count += 1

          print(f'\nИмпорт завершен!')
          print(f'\nУспешно добавлено: {success_count}')
          print(f'\nПовторов: {exists_count}')
          print(f'\nОшибок: {error_count}')
          
          if error_count > 0:
              exit(1) # Помечаем шаг как упавший, если были ошибки
          
          # Записываем результаты в outputs шага GitHub Actions
          if 'GITHUB_OUTPUT' in os.environ:
              with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
                  print(f'SUCCESS_COUNT={success_count}', file=fh)
                  print(f'EXISTS_COUNT={exists_count}', file=fh)
          "
      - name: Generate Summary Report
        id: report
        run: |
          echo "Успешно добавлено: ${{ steps.parse_step.outputs.SUCCESS_COUNT }}"
          echo "Уже существовало: ${{ steps.parse_step.outputs.EXISTS_COUNT }}"
          
          FILE=${{ steps.save_name.outputs.CONTACTS_FILE }}
          
          # 1. Общее количество
          TOTAL=$(jq '. | length' $FILE)
          echo "Всего: $TOTAL"
          
          # Сводная таблица по наставникам
          TABLE_TUTOR=$(jq -r '
            [ group_by(.tutor_name)[] | {t: .[0].tutor_name, c: length} ] | sort_by(.c) | reverse 
            | . as $items
            | ($items[] | "\(.t): \(.c) "), 
              "ИТОГО: \( [ $items[].c ] | add )"
          ' $FILE)
          echo "$TABLE_TUTOR"

          # Формируем параметры для текста в Telegram
          # Безопасная запись многострочного вывода
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "table<<EOF" >> $GITHUB_OUTPUT
          echo "**По количеству новичков:**" >> $GITHUB_OUTPUT
          echo "${TABLE_TUTOR:-Нет данных по наставникам}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            📊 **Всего отправлено новичков в БД: ${{ steps.report.outputs.total }} **
            Успешно добавлено: ${{ steps.parse_step.outputs.SUCCESS_COUNT }}
            Уже существовало: ${{ steps.parse_step.outputs.EXISTS_COUNT }}
          
            ${{ steps.report.outputs.table }}
