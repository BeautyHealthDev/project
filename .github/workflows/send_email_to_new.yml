name: Send E-mails to new consultants 

on:
  push:
    paths:
      - 'mailing/ConsultantTreeMLM*.xml'
      # - 'mailing/ReportMLM2MC.xml'
  workflow_dispatch:

jobs:
  build-contacts-list:
    runs-on: ubuntu-latest
    outputs:
      # Прокидываем output шага на уровень всей джобы
      should_send: ${{ steps.detector.outputs.need_send_mail }}
      file_name: "contacts_new_with_dates.json" # Передаем имя файла
    env:
      REPORT_TYPE: 'none' 
      REPORT_NAME: 'none' # Инициализация, чтобы избежать ошибки доступа
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Активирует Node.js 24 для всех JS-действий в этом задании    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Обязательно: выкачиваем историю, чтобы сравнить коммиты

      - name: Detect File
        id: detector
        run: |
          # Получаем список измененных файлов в текущем пуше
          CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r ${{ github.sha }})

          echo "Обнаружены изменения в файлах:"
          echo "$CHANGED_FILES"

          # Проверяем наличие конкретных файлов
          if echo "$CHANGED_FILES" | grep -q "mailing/ReportMLM2MC.xml"; then
            echo "REPORT_TYPE=ReportMLM2MC" >> $GITHUB_ENV
            echo "need_send_mail=false" >> $GITHUB_OUTPUT
          elif echo "$CHANGED_FILES" | grep -q "mailing/ConsultantTreeMLM.*\.xml"; then
            echo "REPORT_TYPE=ConsultantTreeMLM" >> $GITHUB_ENV
            echo "need_send_mail=true" >> $GITHUB_OUTPUT
          fi

          # Ищем файл в списке измененных по маске
          # Используем -o для вывода только совпадения и basename для очистки пути
          MATCHED_FILE=$(echo "$CHANGED_FILES" | grep -oE "mailing/(ReportMLM2MC|ConsultantTreeMLM)[^ ]*\.xml" | head -n 1)

          if [ -n "$MATCHED_FILE" ]; then
            # Убираем путь "mailing/" и расширение ".xml"
            FILENAME=$(basename "$MATCHED_FILE" .xml)  
            echo "REPORT_NAME=$FILENAME" >> $GITHUB_ENV
            echo "found=true" >> $GITHUB_OUTPUT
            echo "Найдено: $FILENAME"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "Файлы не найдены"
          fi
      - name: Install xsltproc
        run: |
          sudo apt-get update
          sudo apt-get install -y xsltproc

      - name: Use result
        if: steps.detector.outputs.found == 'true'
        run: |
          echo "Работаем с отчетом: ${{ env.REPORT_NAME }}"
          
      - name: Transform XML to JSON
        run: |
          # Получаем дату в нужном формате
          YESTERDAY=$(date -d 'yesterday' +'%Y-%m-%dT00:00:00')
          # Выводим в консоль для проверки
          echo "Value of YESTERDAY: $YESTERDAY"
          # Запускаем трансформацию с параметрами
          xsltproc --stringparam fromDate "$YESTERDAY" \
                   --stringparam toDate "$YESTERDAY" \
                   mailing/contacts_new_${REPORT_TYPE}.xsl mailing/${REPORT_NAME}.xml > contacts_new_with_dates.json
          # Считаем элементы и выводим в консоль
          COUNT=$(jq '. | length' contacts_new_with_dates.json)
          echo "Количество элементов в файле: $COUNT"
          # Вывод результата в лог для проверки
          cat contacts_new_with_dates.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mail-contacts
          path: contacts_new_with_dates.json
          
  # # 2. Вторая джоба: запуск рассылки по условию
  # send-emails:
  #   needs: build-contacts-list
  #   # Условие: запускать только если в первой джобе вернули 'true'
  #   if: needs.build-contacts-list.outputs.should_send == 'true'
  #   uses: ./.github/workflows/email_blast_with_delay.yml
  #   with:
  #     # Используем имя файла, которое передали из первой джобы
  #     contacts_name: ${{ needs.build-contacts-list.outputs.file_name }}
  #     template_name: 'mailing/new.txt'
  #     delay_seconds: '3'
  #   secrets: inherit
    
  send-tg-report:
    # needs: [build-contacts-list, send-emails]
    needs: [build-contacts-list]
    # Запускаем, если файл был найден, даже если рассылка (email) не требуется
    if: needs.build-contacts-list.outputs.file_name != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download result
        uses: actions/download-artifact@v4
        with:
          name: mail-contacts

      - name: Generate Summary Report
        id: report
        run: |
          FILE="contacts_new_with_dates.json"
          
          # 1. Общее количество
          TOTAL=$(jq '. | length' $FILE)
          
          # 2. Сводная таблица по наставникам
          TABLE=$(jq -r '
            [ group_by(.tutor_name)[] | {t: .[0].tutor_name, c: length} ] | sort_by(.c) | reverse 
            | . as $items
            | ($items[] | "\(.t): \(.c)"), 
              "ИТОГО: \( [ $items[].c ] | add )"
          ' $FILE)

          # Формируем параметры для текста в Telegram
          # Безопасная запись многострочного вывода
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "table<<EOF" >> $GITHUB_OUTPUT
          echo "${TABLE:-Нет данных по наставникам}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            **Всего новичков: ${{ steps.report.outputs.total }} **
            📊 **Распределение по наставникам:**
            ${{ steps.report.outputs.table }}
    name: Import Consultants from JSON

  upload_to_server:
    needs: [build-contacts-list]
    runs-on: ubuntu-latest
    steps:
      # 1. Скачиваем файлы репозитория на виртуальную машину GitHub
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. Скрипт на Python для чтения JSON и отправки POST-запросов
      - name: Parse and Send JSON data
        env:
          API_URL: ${{ secrets.DB_API_URL }}
          API_TOKEN: ${{ secrets.DB_API_TOKEN }}
        run: |
          python -c "
          import json
          import os
          import urllib.request

          # Читаем секреты из переменных окружения GitHub
          api_url = os.environ['API_URL']
          api_token = os.environ['API_TOKEN']
          file_path = 'contacts_new_with_dates.json'

          # Проверяем, существует ли файл в репозитории
          if not os.path.exists(file_path):
              print(f'Ошибка: Файл {file_path} не найден в репозитории!')
              exit(1)

          with open(file_path, 'r', encoding='utf-8') as f:
              try:
                  consultants = json.load(f)
              except json.JSONDecodeError:
                  print('Ошибка: Файл содержит невалидный JSON!')
                  exit(1)

          print(f'Найдено записей для импорта: {len(consultants)}')

          success_count = 0
          error_count = 0

          # Перебираем каждого консультанта в массиве
          for idx, item in enumerate(consultants, 1):
              # Проверяем обязательное поле
              if 'cons_number' not in item:
                  print(f'Запись #{idx} пропущена: отсутствует cons_number')
                  error_count += 1
                  continue

              # Формируем тело запроса
              data_bytes = json.dumps(item).encode('utf-8')

              # Настраиваем заголовки (включая наш секретный токен защиты)
              req = urllib.request.Request(
                  api_url, 
                  data=data_bytes, 
                  headers={
                      'Content-Type': 'application/json',
                      'X-Api-Token': api_token
                  },
                  method='POST'
              )

              try:
                  with urllib.request.urlopen(req) as response:
                      res_body = response.read().decode('utf-8')
                      res_json = json.loads(res_body)
                      if res_json.get('success'):
                          success_count += 1
                      else:
                          print(f'Ошибка отправки записи {item[\"cons_number\"]}: {res_json.get(\"error\")}')
                          error_count += 1
              except Exception as e:
                  print(f'Сервер вернул ошибку при отправке {item[\"cons_number\"]}: {e}')
                  error_count += 1

          print(f'\nИмпорт завершен!')
          print(f'Успешно добавлено: {success_count}')
          print(f'Ошибок: {error_count}')
          
          if error_count > 0:
              exit(1) # Помечаем шаг как упавший, если были ошибки
          "

